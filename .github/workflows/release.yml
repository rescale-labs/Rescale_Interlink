name: Release Rescale Interlink
run-name: ${{ github.actor }} is releasing Rescale Interlink

on:
  push:
    tags:
      - "v*"

permissions:
  id-token: write # Required for OIDC
  contents: read

jobs:
  windows-build:
    runs-on: windows-latest
    environment: production

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Run build script
        run: ./build/build_dist.ps1 -ReleaseTag "${{ github.ref_name }}"
        shell: pwsh

      - name: Azure login
        uses: azure/login@v1
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - name: Sign executable using Azure Trusted Signing
        uses: azure/artifact-signing-action@v0
        with:
          files-folder: ${{ github.workspace }}\_build\bin
          files-folder-filter: exe
          file-digest: SHA256
          timestamp-rfc3161: http://timestamp.acs.microsoft.com
          timestamp-digest: SHA256
          endpoint: https://eus.codesigning.azure.net/
          code-signing-account-name: ${{ secrets.AZURE_TRUSTED_SIGNING_ACCOUNT }}
          certificate-profile-name: ${{ secrets.AZURE_TRUSTED_SIGNING_PROFILE }}
          exclude-environment-credential: true
          exclude-workload-identity-credential: true
          exclude-managed-identity-credential: true
          exclude-shared-token-cache-credential: true
          exclude-visual-studio-credential: true
          exclude-visual-studio-code-credential: true
          exclude-azure-cli-credential: false
          exclude-azure-powershell-credential: true
          exclude-azure-developer-cli-credential: true
          exclude-interactive-browser-credential: true

      - name: Zip portable release
        run: Compress-Archive -Path ${{ github.workspace }}\_build\bin\* -DestinationPath rescale-interlink-${{ github.ref_name }}-win_amd64.zip
        shell: pwsh

      - name: Create installer
        run: ./build/build_installer.ps1 -ReleaseTag "${{ github.ref_name }}" -MsiName "rescale-interlink-${{ github.ref_name }}-win_amd64.msi"
        shell: pwsh

      # v4.5.8: Sign the MSI after creation. The MSI is what users double-click,
      # so it must be signed to avoid SmartScreen "Unknown publisher" errors.
      - name: Sign MSI installer using Azure Trusted Signing
        uses: azure/artifact-signing-action@v0
        with:
          files-folder: ${{ github.workspace }}
          files-folder-filter: msi
          file-digest: SHA256
          timestamp-rfc3161: http://timestamp.acs.microsoft.com
          timestamp-digest: SHA256
          endpoint: https://eus.codesigning.azure.net/
          code-signing-account-name: ${{ secrets.AZURE_TRUSTED_SIGNING_ACCOUNT }}
          certificate-profile-name: ${{ secrets.AZURE_TRUSTED_SIGNING_PROFILE }}
          exclude-environment-credential: true
          exclude-workload-identity-credential: true
          exclude-managed-identity-credential: true
          exclude-shared-token-cache-credential: true
          exclude-visual-studio-credential: true
          exclude-visual-studio-code-credential: true
          exclude-azure-cli-credential: false
          exclude-azure-powershell-credential: true
          exclude-azure-developer-cli-credential: true
          exclude-interactive-browser-credential: true

      # v4.5.8: Regenerate checksum after signing changes the MSI file hash
      - name: Regenerate MSI checksum after signing
        run: |
          $msiPath = "rescale-interlink-${{ github.ref_name }}-win_amd64.msi"
          $hash = (Get-FileHash -Path $msiPath -Algorithm SHA256).Hash.ToLower()
          "$hash  $msiPath" | Out-File -FilePath "$msiPath.sha256" -Encoding ASCII
        shell: pwsh

      - name: Upload Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: rescale-interlink-${{ github.ref_name }}-win_amd64
          path: |
            rescale-interlink-${{ github.ref_name }}-win_amd64.*
            !rescale-interlink-${{ github.ref_name }}-win_amd64.wixpdb

  macos-build:
    runs-on: macos-14  # Apple Silicon (M1) runner
    environment: production

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install Go 1.24.2
        run: |
          curl -L -o go1.24.2.darwin-arm64.tar.gz https://go.dev/dl/go1.24.2.darwin-arm64.tar.gz
          sudo rm -rf /usr/local/go
          sudo tar -C /usr/local -xzf go1.24.2.darwin-arm64.tar.gz
          rm go1.24.2.darwin-arm64.tar.gz
          echo "/usr/local/go/bin" >> $GITHUB_PATH
          echo "$HOME/go/bin" >> $GITHUB_PATH

      - name: Install Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Select Xcode
        run: |
          # Use full Xcode SDK instead of CommandLineTools for proper Objective-C
          # header resolution (NSUInteger, NSInteger, etc.) required by Wails/CGo.
          # Find the latest Xcode installed on the runner.
          XCODE_APP=$(ls -d /Applications/Xcode*.app 2>/dev/null | sort -V | tail -1)
          if [ -z "$XCODE_APP" ]; then
            echo "No Xcode found in /Applications" >&2
            exit 1
          fi
          echo "Selecting: $XCODE_APP"
          sudo xcode-select -s "$XCODE_APP/Contents/Developer"
          xcodebuild -version
          xcrun --show-sdk-path

      - name: Install Wails CLI
        run: go install github.com/wailsapp/wails/v2/cmd/wails@latest

      - name: Install frontend dependencies
        run: cd frontend && npm install

      - name: Build Wails GUI application
        run: |
          BUILD_TIME=$(date +%Y-%m-%d)
          LDFLAGS="-s -w -X github.com/rescale/rescale-int/internal/version.Version=${{ github.ref_name }} -X github.com/rescale/rescale-int/internal/version.BuildTime=${BUILD_TIME}"
          GOFIPS140=latest CGO_LDFLAGS="-framework UniformTypeIdentifiers" \
            wails build -platform darwin/arm64 -ldflags "$LDFLAGS"

      - name: Build standalone CLI binary
        run: |
          BUILD_TIME=$(date +%Y-%m-%d)
          LDFLAGS="-s -w -X github.com/rescale/rescale-int/internal/version.Version=${{ github.ref_name }} -X github.com/rescale/rescale-int/internal/version.BuildTime=${BUILD_TIME}"
          GOFIPS140=latest CGO_LDFLAGS="-framework UniformTypeIdentifiers" \
            go build -ldflags "$LDFLAGS" -o rescale-int ./cmd/rescale-int

      - name: Install Apple Certificate
        env:
          CERTIFICATE_BASE64: ${{ secrets.MACOS_P12_B64 }}
          CERT_PASSWORD: ${{ secrets.MACOS_P12_PASSWORD }}
          KEYCHAIN_PASSWORD: "temporary-keychain-password"
        run: |
          CERT_PATH=$RUNNER_TEMP/build_certificate.p12
          KEYCHAIN_PATH=$RUNNER_TEMP/app-signing.keychain-db

          # Decode certificate from secrets
          echo -n "$CERTIFICATE_BASE64" | base64 --decode -o $CERT_PATH

          # Convert .p12 from modern PKCS#12 format (AES-256-CBC/PBES2) to legacy
          # format (3DES) that macOS security import understands.
          # The system openssl (1.1.1) can read the file but doesn't have -legacy.
          # Homebrew openssl@3 is pre-installed on the runner and has -legacy.
          OPENSSL=$(brew --prefix openssl@3)/bin/openssl
          echo "OpenSSL for conversion: $($OPENSSL version)"
          PEM_PATH=$RUNNER_TEMP/build_certificate.pem
          LEGACY_PATH=$RUNNER_TEMP/build_certificate_legacy.p12
          # Step 1: Decrypt .p12 to PEM (key + cert)
          "$OPENSSL" pkcs12 -in "$CERT_PATH" -out "$PEM_PATH" -nodes -passin pass:"$CERT_PASSWORD"
          # Step 2: Re-export PEM to legacy .p12 (3DES)
          "$OPENSSL" pkcs12 -export -legacy -in "$PEM_PATH" -out "$LEGACY_PATH" -passout pass:"$CERT_PASSWORD"
          # Clean up PEM (contains unencrypted private key)
          rm -f "$PEM_PATH"
          mv "$LEGACY_PATH" "$CERT_PATH"

          # Setup keychain
          security create-keychain -p "$KEYCHAIN_PASSWORD" $KEYCHAIN_PATH
          security set-keychain-settings -lut 21600 $KEYCHAIN_PATH
          security unlock-keychain -p "$KEYCHAIN_PASSWORD" $KEYCHAIN_PATH

          # Import certificate to keychain
          security import $CERT_PATH -P "$CERT_PASSWORD" -A -t cert -f pkcs12 -k $KEYCHAIN_PATH
          security list-keychain -d user -s $KEYCHAIN_PATH

          # List identities to verify import and capture the signing identity
          echo "Available signing identities:"
          security find-identity -v -p codesigning $KEYCHAIN_PATH

      - name: Sign application bundle
        env:
          IDENTITY: "Rescale, Inc"
        run: |
          APP_PATH="build/bin/rescale-int-gui.app"

          # Deep-sign the .app bundle (signs all nested binaries/frameworks)
          codesign --force --deep --options runtime \
            --sign "$IDENTITY" \
            --timestamp \
            "$APP_PATH"

          # Sign the standalone CLI binary
          codesign --force --options runtime \
            --sign "$IDENTITY" \
            --timestamp \
            rescale-int

          # Verify signatures
          echo "Verifying .app signature:"
          codesign --verify --deep --strict --verbose=2 "$APP_PATH"
          echo ""
          echo "Verifying CLI signature:"
          codesign --verify --strict --verbose=2 rescale-int

      - name: Create distribution zip
        run: |
          # Create README
          cat > README.txt << 'EOF'
          Rescale Interlink ${{ github.ref_name }} - macOS (Apple Silicon)

          CONTENTS
          ========
          rescale-int-gui.app  - GUI application (double-click to run)
          rescale-int          - CLI tool (run from terminal)

          QUICK START
          ===========
          GUI Mode:
            Double-click "rescale-int-gui.app", or:
            open rescale-int-gui.app

          CLI Mode:
            ./rescale-int --help
            ./rescale-int jobs list
            ./rescale-int upload file.txt

          For CLI-only usage, copy rescale-int to a directory in your PATH:
            sudo cp rescale-int /usr/local/bin/

          Documentation: https://docs.rescale.com
          Copyright (c) 2026 Rescale, Inc.
          EOF

          # Create zip with .app bundle + CLI + README
          # Use ditto for macOS — it preserves extended attributes, resource forks,
          # and code signatures (unlike zip which can strip them)
          mkdir -p _dist
          cp -R build/bin/rescale-int-gui.app _dist/
          cp rescale-int _dist/
          cp README.txt _dist/
          cd _dist
          ditto -c -k --sequesterRsrc --keepParent . \
            ../rescale-interlink-${{ github.ref_name }}-macos_aarch64.zip
          cd ..

      - name: Write App Store Connect API key to disk
        run: |
          mkdir -p "$RUNNER_TEMP/notary"
          echo "${{ secrets.ASC_API_KEY_P8_B64 }}" | base64 --decode > "$RUNNER_TEMP/notary/AuthKey.p8"
          chmod 600 "$RUNNER_TEMP/notary/AuthKey.p8"

      - name: Notarize
        run: |
          xcrun notarytool submit \
            "rescale-interlink-${{ github.ref_name }}-macos_aarch64.zip" \
            --key "$RUNNER_TEMP/notary/AuthKey.p8" \
            --key-id "${{ secrets.ASC_KEY_ID }}" \
            --issuer "${{ secrets.ASC_ISSUER_ID }}" \
            --wait

      - name: Staple notarization ticket
        run: |
          # Staple the ticket to the .app bundle (not the zip)
          xcrun stapler staple build/bin/rescale-int-gui.app

          # Recreate the zip with the stapled .app
          rm -rf _dist
          mkdir -p _dist
          cp -R build/bin/rescale-int-gui.app _dist/
          cp rescale-int _dist/
          cp README.txt _dist/
          cd _dist
          ditto -c -k --sequesterRsrc --keepParent . \
            ../rescale-interlink-${{ github.ref_name }}-macos_aarch64.zip
          cd ..

      - name: Generate checksum
        run: |
          shasum -a 256 rescale-interlink-${{ github.ref_name }}-macos_aarch64.zip > \
            rescale-interlink-${{ github.ref_name }}-macos_aarch64.zip.sha256
          cat rescale-interlink-${{ github.ref_name }}-macos_aarch64.zip.sha256

      - name: Upload Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: rescale-interlink-${{ github.ref_name }}-macos_aarch64
          path: |
            rescale-interlink-${{ github.ref_name }}-macos_aarch64.*

      - name: Cleanup keychain
        if: always()
        run: |
          security delete-keychain $RUNNER_TEMP/app-signing.keychain-db 2>/dev/null || true
          rm -f $RUNNER_TEMP/build_certificate.p12 2>/dev/null || true
          rm -rf $RUNNER_TEMP/notary 2>/dev/null || true

  release:
    name: Create Release
    needs: [windows-build, macos-build]
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: ./artifacts
          pattern: rescale-interlink-${{ github.ref_name }}-* # Downloads only artifacts for this version
          merge-multiple: true # Flattens the folder structure for easier uploading

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          # This will automatically pick up all files in the directory
          files: ./artifacts/*
          tag_name: ${{ github.ref_name }}
          draft: true
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
